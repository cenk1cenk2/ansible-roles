---
- name: Test load_vars plugin
  hosts: all
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Create temporary test directory
      ansible.builtin.tempfile:
        state: directory
        prefix: load_vars_test_
      register: test_dir

    - name: Run tests
      block:
        - name: Create test directory structure
          ansible.builtin.file:
            path: '{{ item }}'
            state: directory
            mode: '0755'
          loop:
            - '{{ test_dir.path }}/pattern-test'
            - '{{ test_dir.path }}/env-test/base'
            - '{{ test_dir.path }}/env-test/prod'

        - name: Create pattern test file 1
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/pattern-test/vars1.yml'
            content: |
              ---
              pattern_var_1: value from vars1
              app_name: test-app
              shared_var: vars1 version
            mode: '0644'

        - name: Create pattern test file 2
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/pattern-test/vars2.yml'
            content: |
              ---
              pattern_var_2: value from vars2
              database_host: localhost
              shared_var: vars2 version
            mode: '0644'

        - name: Create environment base variables
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/env-test/base/common.yml'
            content: |
              ---
              app_name: myapp
              log_level: info
              database_host: localhost
              cache_enabled: true
              common_var: from base
            mode: '0644'

        - name: Create environment prod variables
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/env-test/prod/prod.yml'
            content: |
              ---
              log_level: warning
              database_host: prod-db.example.com
              database_ssl: true
              prod_only_var: production specific
            mode: '0644'

        # Test 1: Basic pattern mode
        - name: Test 1 - Pattern mode with *.yml
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
          register: result_pattern

        - name: Verify pattern mode results
          ansible.builtin.assert:
            that:
              - result_pattern is succeeded
              - result_pattern.loaded_files | length == 2
              - result_pattern.variables_loaded > 0
              - result_pattern.ansible_facts.pattern_var_1 == 'value from vars1'
              - result_pattern.ansible_facts.pattern_var_2 == 'value from vars2'
              - result_pattern.ansible_facts.app_name == 'test-app'
              - result_pattern.ansible_facts.database_host == 'localhost'
              - result_pattern.ansible_facts.shared_var == 'vars2 version'

        # Test 2: Non-strict mode with no matches
        - name: Test 2 - Non-strict mode with no matching files
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.json'
          register: result_no_match

        - name: Verify non-strict no-match succeeds with empty results
          ansible.builtin.assert:
            that:
              - result_no_match is succeeded
              - result_no_match.loaded_files | length == 0
              - result_no_match.variables_loaded == 0

        # Test 3: Strict mode with no matches (should fail)
        - name: Test 3 - Strict mode with no matching files
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.json'
            strict: true
          register: result_strict_no_match
          ignore_errors: true

        - name: Verify strict mode fails with no matches
          ansible.builtin.assert:
            that:
              - result_strict_no_match is failed
              - "'strict mode' in result_strict_no_match.msg"

        # Test 4: Pattern without extension (auto-appends .yml/.yaml/.json)
        - name: Test 4 - Pattern mode without extension
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*'
          register: result_no_ext

        - name: Verify extensionless pattern works
          ansible.builtin.assert:
            that:
              - result_no_ext is succeeded
              - result_no_ext.loaded_files | length == 2
              - result_no_ext.ansible_facts.pattern_var_1 == 'value from vars1'

        # Test 5: Missing required parameters
        - name: Test 5a - Missing mode parameter
          cenk1cenk2.reloaded.load_vars:
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
          register: result_missing_mode
          ignore_errors: true

        - name: Verify missing mode fails
          ansible.builtin.assert:
            that:
              - result_missing_mode is failed

        - name: Test 5b - Missing root parameter
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            pattern: '*.yml'
          register: result_missing_root
          ignore_errors: true

        - name: Verify missing root fails
          ansible.builtin.assert:
            that:
              - result_missing_root is failed

        # Test 6: Environment mode - base + prod with overrides
        - name: Test 6 - Environment mode (base + prod)
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: prod
            common: base
          register: result_env

        - name: Verify environment mode loads and overrides correctly
          ansible.builtin.assert:
            that:
              - result_env is succeeded
              - result_env.loaded_files | length == 2
              # Base variables
              - result_env.ansible_facts.app_name == 'myapp'
              - result_env.ansible_facts.cache_enabled == true
              - result_env.ansible_facts.common_var == 'from base'
              # Prod overrides base
              - result_env.ansible_facts.log_level == 'warning'
              - result_env.ansible_facts.database_host == 'prod-db.example.com'
              # Prod-only variables
              - result_env.ansible_facts.database_ssl == true
              - result_env.ansible_facts.prod_only_var == 'production specific'

        # Test 7: Non-strict mode with missing environment directory
        - name: Test 7 - Non-strict with missing environment
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: staging
            common: base
          register: result_missing_env

        - name: Verify non-strict succeeds loading only common files
          ansible.builtin.assert:
            that:
              - result_missing_env is succeeded
              - result_missing_env.ansible_facts.app_name == 'myapp'

        # Test 8: Strict mode with missing environment (should fail even if common exists)
        - name: Test 8 - Strict mode with missing environment
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: staging
            common: base
            strict: true
          register: result_strict_missing_env
          ignore_errors: true

        - name: Verify strict mode fails when environment missing
          ansible.builtin.assert:
            that:
              - result_strict_missing_env is failed
              - "'strict mode' in result_strict_missing_env.msg"

        # Test 9: Environment mode with default common directory
        - name: Test 9 - Default common directory
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: prod
          register: result_default_common

        - name: Verify default common directory works
          ansible.builtin.assert:
            that:
              - result_default_common is succeeded
              - result_default_common.loaded_files | length == 2
              - result_default_common.ansible_facts.app_name == 'myapp'
              - result_default_common.ansible_facts.log_level == 'warning'

      always:
        - name: Clean up temporary test directory
          ansible.builtin.file:
            path: '{{ test_dir.path }}'
            state: absent
          when: test_dir.path is defined
