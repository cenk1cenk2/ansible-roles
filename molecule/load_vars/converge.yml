---
- name: Test load_vars plugin
  hosts: all
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Create temporary test directory
      ansible.builtin.tempfile:
        state: directory
        prefix: load_vars_test_
      register: test_dir

    - name: Run tests
      block:
        - name: Create test directory structure
          ansible.builtin.file:
            path: '{{ item }}'
            state: directory
            mode: '0755'
          loop:
            - '{{ test_dir.path }}/pattern-test'
            - '{{ test_dir.path }}/env-test/base'
            - '{{ test_dir.path }}/env-test/prod'

        - name: Create pattern test file 1
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/pattern-test/vars1.yml'
            content: |
              ---
              pattern_var_1: value from vars1
              app_name: test-app
              shared_var: vars1 version
            mode: '0644'

        - name: Create pattern test file 2
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/pattern-test/vars2.yml'
            content: |
              ---
              pattern_var_2: value from vars2
              database_host: localhost
              shared_var: vars2 version
            mode: '0644'

        - name: Create environment base variables
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/env-test/base/common.yml'
            content: |
              ---
              app_name: myapp
              log_level: info
              database_host: localhost
              cache_enabled: true
              common_var: from base
            mode: '0644'

        - name: Create environment prod variables
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/env-test/prod/prod.yml'
            content: |
              ---
              log_level: warning
              database_host: prod-db.example.com
              database_ssl: true
              prod_only_var: production specific
            mode: '0644'

        # Test 1: Basic pattern mode
        - name: Test 1 - Pattern mode with *.yml
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
          register: result_pattern

        - name: Verify pattern mode results
          ansible.builtin.assert:
            that:
              - result_pattern is succeeded
              - result_pattern.loaded_files | length == 2
              - result_pattern.variables_loaded > 0
              - result_pattern.ansible_facts.pattern_var_1 == 'value from vars1'
              - result_pattern.ansible_facts.pattern_var_2 == 'value from vars2'
              - result_pattern.ansible_facts.app_name == 'test-app'
              - result_pattern.ansible_facts.database_host == 'localhost'
              - result_pattern.ansible_facts.shared_var == 'vars2 version'

        # Test 2: Non-strict mode with no matches
        - name: Test 2 - Non-strict mode with no matching files
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.json'
          register: result_no_match

        - name: Verify non-strict no-match succeeds with empty results
          ansible.builtin.assert:
            that:
              - result_no_match is succeeded
              - result_no_match.loaded_files | length == 0
              - result_no_match.variables_loaded == 0

        # Test 3: Strict mode with no matches (should fail)
        - name: Test 3 - Strict mode with no matching files
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.json'
            strict: true
          register: result_strict_no_match
          ignore_errors: true

        - name: Verify strict mode fails with no matches
          ansible.builtin.assert:
            that:
              - result_strict_no_match is failed
              - "'strict mode' in result_strict_no_match.msg"

        # Test 4: Pattern without extension (auto-appends .yml/.yaml/.json)
        - name: Test 4 - Pattern mode without extension
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*'
          register: result_no_ext

        - name: Verify extensionless pattern works
          ansible.builtin.assert:
            that:
              - result_no_ext is succeeded
              - result_no_ext.loaded_files | length == 2
              - result_no_ext.ansible_facts.pattern_var_1 == 'value from vars1'

        # Test 5: Missing required parameters
        - name: Test 5a - Missing mode parameter
          cenk1cenk2.reloaded.load_vars:
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
          register: result_missing_mode
          ignore_errors: true

        - name: Verify missing mode fails
          ansible.builtin.assert:
            that:
              - result_missing_mode is failed

        - name: Test 5b - Missing root parameter
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            pattern: '*.yml'
          register: result_missing_root
          ignore_errors: true

        - name: Verify missing root fails
          ansible.builtin.assert:
            that:
              - result_missing_root is failed

        # Test 6: Environment mode - base + prod with overrides
        - name: Test 6 - Environment mode (base + prod)
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: prod
            common: base
          register: result_env

        - name: Verify environment mode loads and overrides correctly
          ansible.builtin.assert:
            that:
              - result_env is succeeded
              - result_env.loaded_files | length == 2
              # Base variables
              - result_env.ansible_facts.app_name == 'myapp'
              - result_env.ansible_facts.cache_enabled == true
              - result_env.ansible_facts.common_var == 'from base'
              # Prod overrides base
              - result_env.ansible_facts.log_level == 'warning'
              - result_env.ansible_facts.database_host == 'prod-db.example.com'
              # Prod-only variables
              - result_env.ansible_facts.database_ssl == true
              - result_env.ansible_facts.prod_only_var == 'production specific'

        # Test 7: Non-strict mode with missing environment directory
        - name: Test 7 - Non-strict with missing environment
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: staging
            common: base
          register: result_missing_env

        - name: Verify non-strict succeeds loading only common files
          ansible.builtin.assert:
            that:
              - result_missing_env is succeeded
              - result_missing_env.ansible_facts.app_name == 'myapp'

        # Test 8: Strict mode with missing environment (should fail even if common exists)
        - name: Test 8 - Strict mode with missing environment
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: staging
            common: base
            strict: true
          register: result_strict_missing_env
          ignore_errors: true

        - name: Verify strict mode fails when environment missing
          ansible.builtin.assert:
            that:
              - result_strict_missing_env is failed
              - "'strict mode' in result_strict_missing_env.msg"

        # Test 9: Environment mode with default common directory
        - name: Test 9 - Default common directory
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: prod
          register: result_default_common

        - name: Verify default common directory works
          ansible.builtin.assert:
            that:
              - result_default_common is succeeded
              - result_default_common.loaded_files | length == 2
              - result_default_common.ansible_facts.app_name == 'myapp'
              - result_default_common.ansible_facts.log_level == 'warning'

        # Test 10: scope: return in pattern mode
        - name: Test 10 - scope=return with pattern mode
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
            scope: return
          register: result_return_pattern

        - name: Verify scope=return pattern mode result structure
          ansible.builtin.assert:
            that:
              - result_return_pattern is succeeded
              - result_return_pattern.vars is defined
              - result_return_pattern.vars is mapping
              - result_return_pattern.files is defined
              - result_return_pattern.files | length == 2
              - result_return_pattern.vars.pattern_var_1 == 'value from vars1'
              - result_return_pattern.vars.pattern_var_2 == 'value from vars2'
              - result_return_pattern.vars.app_name == 'test-app'
              - result_return_pattern.vars.shared_var == 'vars2 version'

        - name: Verify scope=return pattern mode per-file structure
          ansible.builtin.assert:
            that:
              - result_return_pattern.files[0].filename is defined
              - result_return_pattern.files[0].path is defined
              - result_return_pattern.files[0].data is defined
              - result_return_pattern.files[0].data.pattern_var_1 == 'value from vars1'

        - name: Verify scope=return does not inject ansible_facts
          ansible.builtin.assert:
            that:
              - "'ansible_facts' not in result_return_pattern or result_return_pattern.ansible_facts == {}"

        # Test 11: scope: return in environment mode
        - name: Test 11 - scope=return with environment mode
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/env-test'
            environment: prod
            common: base
            scope: return
          register: result_return_env

        - name: Verify scope=return environment mode vars and overrides
          ansible.builtin.assert:
            that:
              - result_return_env is succeeded
              - result_return_env.vars is defined
              - result_return_env.vars is mapping
              - result_return_env.vars.app_name == 'myapp'
              - result_return_env.vars.common_var == 'from base'
              - result_return_env.vars.cache_enabled == true
              - result_return_env.vars.log_level == 'warning'
              - result_return_env.vars.database_host == 'prod-db.example.com'
              - result_return_env.vars.database_ssl == true
              - result_return_env.vars.prod_only_var == 'production specific'

        - name: Verify scope=return environment mode files list
          ansible.builtin.assert:
            that:
              - result_return_env.files is defined
              - result_return_env.files | length == 2
              - result_return_env.files | map(attribute='filename') | list | sort == ['common.yml', 'prod.yml']

        # Test 11a: scope=return resolves embedded Jinja against task vars
        - name: Create jinja-test directory
          ansible.builtin.file:
            path: '{{ test_dir.path }}/jinja-test'
            state: directory
            mode: '0755'

        - name: Create jinja-test file with embedded Jinja and lookup
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/jinja-test/instance.yml'
            content: |
              ---
              item:
                greeting: '{{ "{{" }} upstream_value {{ "}}" }}'
                shell_lookup: '{{ "{{" }} lookup("pipe", "echo resolved") {{ "}}" }}'
            mode: '0644'

        - name: Test 11a - scope=return templates loaded YAML against task vars
          vars:
            upstream_value: hello-from-task-vars
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/jinja-test'
            pattern: '*.yml'
            scope: return
          register: result_jinja

        - name: Verify embedded Jinja and lookups resolved at load time
          ansible.builtin.assert:
            that:
              - result_jinja is succeeded
              - result_jinja.files | length == 1
              - result_jinja.files[0].data.item.greeting == 'hello-from-task-vars'
              - result_jinja.files[0].data.item.shell_lookup == 'resolved'
              - result_jinja.vars.item.greeting == 'hello-from-task-vars'
              - result_jinja.vars.item.shell_lookup == 'resolved'

        # Test 11b: scope=return — second file sees facts from first file in same call
        - name: Create cumulative-test directory
          ansible.builtin.file:
            path: '{{ test_dir.path }}/cumulative-test'
            state: directory
            mode: '0755'

        - name: Create cumulative-test first file
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/cumulative-test/01-first.yml'
            content: |
              ---
              from_first_file: alpha
            mode: '0644'

        - name: Create cumulative-test second file referencing first
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/cumulative-test/02-second.yml'
            content: |
              ---
              derived: '{{ "{{" }} from_first_file {{ "}}" }}-beta'
            mode: '0644'

        - name: Test 11b - scope=return cumulative scope refresh
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/cumulative-test'
            pattern: '*.yml'
            scope: return
          register: result_cumulative

        - name: Verify second file resolved against first file's facts
          ansible.builtin.assert:
            that:
              - result_cumulative is succeeded
              - result_cumulative.files | length == 2
              - result_cumulative.vars.from_first_file == 'alpha'
              - result_cumulative.vars.derived == 'alpha-beta'

        # Test 12: result.files and result.root in global mode
        - name: Test 12 - result.files and result.root in global (default) scope
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/pattern-test'
            pattern: '*.yml'
          register: result_global_files

        - name: Verify result.files is defined and is a list in global mode
          ansible.builtin.assert:
            that:
              - result_global_files is succeeded
              - result_global_files.files is defined
              - result_global_files.files | type_debug == 'list'
              - result_global_files.files | length == 2
              - result_global_files.root is defined
              - result_global_files.root == test_dir.path + '/pattern-test'

        - name: Verify result.files entries have required keys in global mode
          ansible.builtin.assert:
            that:
              - item.filename is defined
              - item.path is defined
              - item.data is defined
          loop: '{{ result_global_files.files }}'

        # Test 13: Deep merge across files with shared top-level key
        - name: Create merge-test directory structure
          ansible.builtin.file:
            path: '{{ test_dir.path }}/merge-test/base'
            state: directory
            mode: '0755'

        - name: Create merge-test main.yml with nested dict
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/merge-test/base/main.yml'
            content: |
              ---
              merge_app:
                uri: app.example.com
                registry:
                  uri: registry.example.com
            mode: '0644'

        - name: Create merge-test secrets.yml with overlapping nested dict
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/merge-test/base/secrets.yml'
            content: |
              ---
              merge_app:
                registry:
                  db:
                    name: appdb
                    password: s3cret
            mode: '0644'

        - name: Test 13 - Deep merge across files with same top-level key
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/merge-test'
            environment: nonexistent
            common: base
            hash_behaviour: merge
          register: result_merge

        - name: Verify deep merge preserves both files' nested keys in result
          ansible.builtin.assert:
            that:
              - result_merge is succeeded
              - result_merge.ansible_facts.merge_app.uri == 'app.example.com'
              - result_merge.ansible_facts.merge_app.registry.uri == 'registry.example.com'
              - result_merge.ansible_facts.merge_app.registry.db.name == 'appdb'
              - result_merge.ansible_facts.merge_app.registry.db.password == 's3cret'

        - name: Verify deep merge reached the host's variable cache (catches the bug)
          ansible.builtin.assert:
            that:
              - merge_app.uri == 'app.example.com'
              - merge_app.registry.uri == 'registry.example.com'
              - merge_app.registry.db.name == 'appdb'
              - merge_app.registry.db.password == 's3cret'

        # Test 14: Sequential load_vars calls must not pollute each other
        - name: Create seq-test directory with two files sharing a top-level key
          ansible.builtin.file:
            path: '{{ test_dir.path }}/seq-test/base'
            state: directory
            mode: '0755'

        - name: Create seq-test main.yml
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/seq-test/base/main.yml'
            content: |
              ---
              seq_app:
                uri: seq.example.com
                registry:
                  uri: seq-registry.example.com
            mode: '0644'

        - name: Create seq-test secrets.yml
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/seq-test/base/secrets.yml'
            content: |
              ---
              seq_app:
                registry:
                  db:
                    name: seqdb
                    password: sekret
            mode: '0644'

        - name: Test 14a - First load_vars call (simulates earlier play in aggregator)
          cenk1cenk2.reloaded.load_vars:
            mode: pattern
            root: '{{ test_dir.path }}/seq-test/base'
            pattern: main.yml
            hash_behaviour: merge

        - name: Test 14b - Second load_vars call merging both files
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/seq-test'
            environment: nonexistent
            common: base
            hash_behaviour: merge

        - name: Verify second call's merge reached host with no pollution from first call
          ansible.builtin.assert:
            that:
              - seq_app.uri == 'seq.example.com'
              - seq_app.registry.uri == 'seq-registry.example.com'
              - seq_app.registry.db.name == 'seqdb'
              - seq_app.registry.db.password == 'sekret'

        # Test 15: hash_behaviour=replace still shallow-replaces at top level
        - name: Create replace-test directory with two files sharing a top-level key
          ansible.builtin.file:
            path: '{{ test_dir.path }}/replace-test/base'
            state: directory
            mode: '0755'

        - name: Create replace-test main.yml
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/replace-test/base/main.yml'
            content: |
              ---
              replace_app:
                uri: replace.example.com
                registry:
                  uri: replace-registry.example.com
            mode: '0644'

        - name: Create replace-test secrets.yml
          ansible.builtin.copy:
            dest: '{{ test_dir.path }}/replace-test/base/secrets.yml'
            content: |
              ---
              replace_app:
                registry:
                  db:
                    name: replacedb
                    password: secret
            mode: '0644'

        - name: Test 15 - Replace mode shallow-replaces at top level
          cenk1cenk2.reloaded.load_vars:
            mode: environment
            root: '{{ test_dir.path }}/replace-test'
            environment: nonexistent
            common: base
            hash_behaviour: replace
          register: result_replace

        - name: Verify replace mode drops main.yml's top-level keys
          ansible.builtin.assert:
            that:
              - result_replace is succeeded
              - result_replace.ansible_facts.replace_app.registry.db.name == 'replacedb'
              - "'uri' not in result_replace.ansible_facts.replace_app"

      always:
        - name: Clean up temporary test directory
          ansible.builtin.file:
            path: '{{ test_dir.path }}'
            state: absent
          when: test_dir.path is defined
