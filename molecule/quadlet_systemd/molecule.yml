---
dependency:
  name: galaxy
  enabled: false

driver:
  name: default
  options:
    managed: false

platforms:
  - name: localhost
    groups:
      - local

provisioner:
  name: ansible
  config_options:
    defaults:
      stdout_callback: ansible.builtin.debug
      verbosity: 1
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
  playbooks:
    converge: converge.yml

scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - destroy
