---
# Test playbook for cenk1cenk2.reloaded.load_vars in environment mode
# This playbook verifies:
# - Basic environment mode with base+prod hierarchical loading
# - Variable precedence (prod overrides base)
# - Structured output (loaded_files, variables_loaded)
# - Strict mode behavior with missing environment (should fail)
# - Non-strict mode behavior with missing environment (should succeed)
# - Custom common directory name

- name: Test load_vars plugin - Environment Mode
  hosts: localhost
  gather_facts: false

  tasks:
    # Test 1: Basic environment mode - load base + prod
    - name: Test 1 - Load variables using environment mode (base + prod)
      cenk1cenk2.reloaded.load_vars:
        mode: environment
        root: ./test-vars/env-test
        environment: prod
        common: base
      register: result_env

    - name: Verify environment mode loaded files
      ansible.builtin.assert:
        that:
          - result_env is succeeded
          - result_env.loaded_files is defined
          - result_env.loaded_files | length == 2
          - result_env.variables_loaded is defined
          - result_env.variables_loaded > 0
        fail_msg: 'Environment mode failed to load files correctly'
        success_msg: 'Environment mode loaded {{ result_env.loaded_files | length }} files with {{ result_env.variables_loaded }} variables'

    - name: Verify base variables are loaded
      ansible.builtin.assert:
        that:
          - app_name is defined
          - app_name == 'myapp'
          - cache_enabled is defined
          - cache_enabled == true
          - common_var is defined
          - common_var == 'from base'
        fail_msg: 'Base variables were not loaded correctly'
        success_msg: 'Base variables loaded correctly'

    - name: Verify prod variables override base variables
      ansible.builtin.assert:
        that:
          # These should be overridden by prod values
          - log_level is defined
          - log_level == 'warning' # prod overrides base 'info'
          - database_host is defined
          - database_host == 'prod-db.example.com' # prod overrides base 'localhost'
          # These are prod-only variables
          - database_ssl is defined
          - database_ssl == true
          - prod_only_var is defined
          - prod_only_var == 'production specific'
        fail_msg: 'Prod variables did not override base or prod-specific variables missing'
        success_msg: 'Variable precedence working correctly - prod overrides base'

    - name: Display loaded files information
      ansible.builtin.debug:
        msg:
          - 'Loaded files: {{ result_env.loaded_files }}'
          - 'Variables loaded: {{ result_env.variables_loaded }}'
          - 'Message: {{ result_env.msg }}'
          - ''
          - 'Variable values (verifying override):'
          - '  app_name: {{ app_name }} (from base)'
          - '  log_level: {{ log_level }} (prod overrides base)'
          - '  database_host: {{ database_host }} (prod overrides base)'

    # Test 2: Non-strict mode with missing environment (should succeed with warning)
    - name: Clear variables for next test
      ansible.builtin.set_fact:
        app_name: null
        log_level: null
        database_host: null
        cache_enabled: null
        common_var: null
        database_ssl: null
        prod_only_var: null

    - name: Test 2 - Non-strict mode with missing environment directory
      cenk1cenk2.reloaded.load_vars:
        mode: environment
        root: ./test-vars/env-test
        environment: staging # This directory does not exist
        common: base
        strict: false
      register: result_missing_env_non_strict

    - name: Verify non-strict mode succeeds with missing environment
      ansible.builtin.assert:
        that:
          - result_missing_env_non_strict is succeeded
          - result_missing_env_non_strict.loaded_files | length >= 0
          # Should at least load base files
          - app_name is defined
          - app_name == 'myapp'
        fail_msg: 'Non-strict mode should succeed when environment directory is missing'
        success_msg: 'Non-strict mode correctly succeeded with missing environment'

    # Test 3: Strict mode with missing environment (should fail)
    - name: Test 3 - Strict mode with completely missing directories (should fail)
      cenk1cenk2.reloaded.load_vars:
        mode: environment
        root: ./test-vars/env-test
        environment: nonexistent
        common: nonexistent-base
        strict: true
      register: result_missing_strict
      ignore_errors: true

    - name: Verify strict mode fails with no files
      ansible.builtin.assert:
        that:
          - result_missing_strict is failed
          - result_missing_strict.msg is defined
        fail_msg: 'Strict mode should fail when no files found'
        success_msg: 'Strict mode correctly failed: {{ result_missing_strict.msg }}'

    # Test 4: Environment mode with default common directory (defaults to 'base')
    - name: Clear variables for next test
      ansible.builtin.set_fact:
        app_name: null
        log_level: null
        database_host: null
        cache_enabled: null
        common_var: null
        database_ssl: null
        prod_only_var: null

    - name: Test 4 - Environment mode with default common directory
      cenk1cenk2.reloaded.load_vars:
        mode: environment
        root: ./test-vars/env-test
        environment: prod
        # common defaults to 'base'
      register: result_default_common

    - name: Verify default common directory works
      ansible.builtin.assert:
        that:
          - result_default_common is succeeded
          - result_default_common.loaded_files | length == 2
          - app_name == 'myapp'
          - log_level == 'warning'
        fail_msg: 'Default common directory (base) did not work'
        success_msg: 'Default common directory worked correctly'

    - name: Final test summary
      ansible.builtin.debug:
        msg:
          - '✓ Test 1: Basic environment mode (base + prod) - PASSED'
          - '✓ Test 2: Non-strict mode with missing environment - PASSED'
          - '✓ Test 3: Strict mode with missing directories - PASSED'
          - '✓ Test 4: Default common directory - PASSED'
          - ''
          - 'All environment mode tests completed successfully!'
