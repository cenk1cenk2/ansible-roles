---
# Taskfile for ansible-roles repository
# https://taskfile.dev/
version: '3'

vars:
  TEST_IMAGE: quay.io/ansible/creator-ee:latest

tasks:
  test:
    desc: Run all tests
    cmds:
      - task: test:reloaded

  test:reloaded:
    desc: Run reloaded collection Molecule tests in a container
    cmds:
      - >-
        podman run --rm -v "{{.ROOT_DIR}}/reloaded:/workspace/reloaded:Z" -w /workspace/reloaded {{.TEST_IMAGE}} sh -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | VERIFY_CHECKSUM=false bash && ansible-galaxy collection install --force . && molecule test --all"

